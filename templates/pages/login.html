{% extends 'layout.html' %}

{% block title %} Login - MiAppFlask {% endblock %}

{% block content %}
    <h2 class="text-center my-5">Iniciar Sesión</h2>

{#    <form action="{{ url_for('web.login') }}" method="POST">#}
    <form id="form-login" class="mx-auto">
        <table cellpadding="5" cellspacing="4" border="0">
            <tbody>
                <tr>
                    <td><strong>Usuario:</strong></td>
                    <td><input class="form-control form-control-sm shadow-none" type="text" name="username" id="username" /></td>
                </tr>
                <tr>
                    <td><strong>Contraseña:</strong></td>
                    <td><input class="form-control form-control-sm shadow-none" type="password" name="password" id="password"/></td>
                </tr>
                <tr>
                    <td class="form-check">
                        <input class="form-check-input" type="checkbox" name="remember_me" id="remember_me">
                        <label class="form-check-label" for="remember_me">Recordame</label>
                    </td>
                </tr>

                <tr>
                    <td colspan="2" align="center"><button class="btn btn-sm btn-primary w-100" type="submit">Iniciar Sesión</button></td>
                </tr>
            </tbody>
        </table>
    </form>
{% endblock %}
