{% extends 'layout.html' %}

{% block title %} Login - MiAppFlask {% endblock %}

{% block content %}
    <div class="container d-flex justify-content-center align-items-center min-vh-100">
        <div class="card p-5" style="width: 100%; max-width: 400px;">
            <h2 class="text-center mb-4">Iniciar Sesión</h2>

            <div id="message" class="alert" role="alert" style="display: none;"></div>

            <!-- Tab para cambiar entre login tradicional y biometría -->
            <ul class="nav nav-tabs" id="loginTabs" role="tablist">
                <li class="nav-item" role="presentation">
                    <button class="nav-link active" id="traditional-tab" data-bs-toggle="tab" data-bs-target="#traditional" type="button">
                        Contraseña
                    </button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link" id="biometric-tab" data-bs-toggle="tab" data-bs-target="#biometric" type="button">
                        🔒 Huella/Cara
                    </button>
                </li>
            </ul>

            <div class="tab-content mt-4" id="loginTabsContent">
                <!-- Tab: Login Tradicional -->
                <div class="tab-pane fade show active" id="traditional" role="tabpanel">
                    <form id="loginForm">
                        <div class="mb-3">
                            <label for="username" class="form-label">Usuario</label>
                            <input type="text" class="form-control" id="username" name="username" required>
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label">Contraseña</label>
                            <input type="password" class="form-control" id="password" name="password" required>
                        </div>

                        <div class="mb-3 form-check">
                            <input type="checkbox" class="form-check-input" id="rememberMe" name="remember_me">
                            <label class="form-check-label" for="rememberMe">Recuérdame</label>
                        </div>

                        <button type="submit" class="btn btn-primary w-100">Iniciar Sesión</button>
                    </form>
                </div>

                <!-- Tab: Login con Biometría -->
                <div class="tab-pane fade" id="biometric" role="tabpanel">
                    <div class="mb-3">
                        <label for="biometricUsername" class="form-label">Usuario</label>
                        <input type="text" class="form-control" id="biometricUsername" placeholder="Ingresa tu usuario">
                    </div>

                    <button type="button" id="btn-biometric-login" class="btn btn-success w-100">
                        🔒 Usar Huella/Cara
                    </button>

                    <small class="text-muted d-block mt-2">
                        Asegúrate de haber configurado biometría en tu cuenta antes.
                    </small>
                </div>
            </div>
        </div>
    </div>
{% endblock %}

{% block script_js %}
    <script src="{{ url_for('static', filename='js/modules/webauthn.js') }}"></script>
    <script>
        const webauthn = new WebAuthnManager();
        const messageDiv = document.getElementById('message');

        function showMessage(text, type = 'info') {
            messageDiv.textContent = text;
            messageDiv.className = `alert alert-${type}`;
            messageDiv.style.display = 'block';
        }

        async function parseApiResponse(response) {
            const contentType = response.headers.get('content-type') || '';
            if (contentType.includes('application/json')) {
                return await response.json();
            }

            const htmlText = await response.text();
            const isHtml = htmlText.trim().startsWith('<!doctype') || htmlText.trim().startsWith('<html');
            if (isHtml) {
                throw new Error('El servidor devolvio HTML en lugar de JSON. Revisa la terminal de Flask.');
            }

            throw new Error('Respuesta inesperada del servidor.');
        }

        // Login tradicional
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('rememberMe').checked;

            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username,
                        password,
                        remember_me: rememberMe
                    })
                });

                const data = await parseApiResponse(response);

                if (data.ok) {
                    if (data.requires_2fa) {
                        window.location.href = data.redirect;
                    } else {
                        window.location.href = data.redirect;
                    }
                } else {
                    showMessage('❌ ' + data.message, 'danger');
                }
            } catch (error) {
                showMessage('❌ Error en login: ' + error.message, 'danger');
            }
        });

        // Login con biometría
        document.getElementById('btn-biometric-login').addEventListener('click', async () => {
            const username = document.getElementById('biometricUsername').value.trim();

            if (!username) {
                showMessage('❌ Por favor ingresa tu usuario', 'warning');
                return;
            }

            try {
                showMessage('🔄 Autenticando con biometría...', 'info');
                const result = await webauthn.startAuthentication(username);

                if (result.ok) {
                    showMessage('✅ ' + result.message, 'success');
                    setTimeout(() => {
                        window.location.href = result.redirect;
                    }, 1500);
                } else {
                    showMessage('❌ ' + result.message, 'danger');
                }
            } catch (error) {
                showMessage('❌ Error: ' + error.message, 'danger');
            }
        });
    </script>
{% endblock %}
